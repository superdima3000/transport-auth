basePath: /
definitions:
  controller.signInInput:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  db.Card:
    properties:
      balance:
        type: number
      card_number:
        type: string
      id:
        type: integer
      is_blocked:
        type: boolean
      key_id:
        type: integer
      owner_name:
        type: string
    type: object
  db.Key:
    properties:
      id:
        type: integer
      name:
        type: string
      value:
        type: string
    type: object
  db.Terminal:
    properties:
      address:
        type: string
      id:
        type: integer
      name:
        type: string
      serial_number:
        type: string
    type: object
  db.Transaction:
    properties:
      amount:
        type: number
      card_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      terminal_id:
        type: integer
    required:
    - amount
    type: object
  db.UpdateCard:
    properties:
      balance:
        type: number
      card_number:
        type: string
      is_blocked:
        type: boolean
      key_id:
        type: integer
      owner_name:
        type: string
    type: object
  db.UpdateKey:
    properties:
      name:
        type: string
      value:
        type: string
    type: object
  db.UpdateTerminal:
    properties:
      address:
        type: string
      name:
        type: string
      serial_number:
        type: string
    type: object
  db.UpdateTransaction:
    properties:
      amount:
        type: number
      card_id:
        type: integer
      terminal_id:
        type: integer
    type: object
  db.UpdateUser:
    properties:
      is_admin:
        type: integer
      login:
        type: string
    required:
    - login
    type: object
  db.User:
    properties:
      id:
        type: integer
      is_admin:
        type: integer
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
host: localhost:8888
info:
  contact: {}
  description: RESTful API server for MIFARE transactions authorization
  title: MIFARE API
  version: "0.1"
paths:
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Ввод логина и пароля для получения токена доступа
      parameters:
      - description: Логин и пароль
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/controller.signInInput'
      produces:
      - application/json
      responses:
        "200":
          description: Возвращает JWT токен
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Ошибка авторизации
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Авторизация пользователя
      tags:
      - auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя в системе
      parameters:
      - description: Данные пользователя (login, password, is_admin)
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/db.User'
      produces:
      - application/json
      responses:
        "200":
          description: Возвращает ID созданного пользователя
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Регистрация пользователя
      tags:
      - auth
  /cards:
    get:
      consumes:
      - application/json
      description: Возвращает список всех карт
      produces:
      - application/json
      responses:
        "200":
          description: Список карт
          schema:
            items:
              $ref: '#/definitions/db.Card'
